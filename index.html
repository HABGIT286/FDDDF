<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Center - Luxury Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #7b2cbf;
            --accent: #ff006e;
            --gold: #ffd700;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.3;
            animation: float 15s infinite;        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Loading Screen */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-container.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .loader-ring:nth-child(2) {
            border-top-color: var(--accent);
            animation-delay: -0.5s;
            width: 80%;
            height: 80%;            top: 10%;
            left: 10%;
        }

        .loader-ring:nth-child(3) {
            border-top-color: var(--gold);
            animation-delay: -1s;
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 3px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Notification Dot */
        .notification-dot {
            position: fixed;
            top: 30px;
            left: 30px;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            z-index: 1000;
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent), 0 0 60px var(--accent);
        }

        .notification-dot.active {
            opacity: 1;            animation: notifyPulse 2s ease-in-out;
        }

        @keyframes notifyPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .header h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        .league-badge {
            display: inline-block;
            padding: 10px 30px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Match Score Card */
        .match-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .match-content {
            position: relative;
            z-index: 1;
        }

        .teams-container {
            display: flex;
            justify-content: space-between;            align-items: center;
            margin-bottom: 40px;
        }

        .team {
            flex: 1;
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .team:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .team-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            object-fit: cover;
        }

        .team-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .score-container {
            flex: 0 0 300px;
            text-align: center;
            position: relative;
        }

        .score {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;            margin-bottom: 15px;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .match-time {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(255, 0, 110, 0.4);
            animation: timePulse 2s ease-in-out infinite;
        }

        @keyframes timePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-values {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            font-weight: 700;
        }

        .stat-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
        }
        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            transition: width 1s ease;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Events Timeline */
        .events-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--glass-border);
        }

        .events-timeline {
            position: relative;
            padding-right: 40px;
        }

        .events-timeline::before {
            content: '';
            position: absolute;
            right: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--accent), var(--gold));
        }

        .event-item {
            position: relative;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);            border-radius: 15px;
            border-right: 4px solid transparent;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .event-item:hover {
            transform: translateX(-10px);
            background: rgba(255, 255, 255, 0.05);
        }

        .event-item.goal { border-right-color: var(--gold); }
        .event-item.card-yellow { border-right-color: #ffd700; }
        .event-item.card-red { border-right-color: #ff0000; }
        .event-item.substitution { border-right-color: var(--primary); }
        .event-item.corner { border-right-color: var(--secondary); }

        .event-time {
            position: absolute;
            right: -50px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .event-icon {
            font-size: 24px;
            margin-left: 15px;
        }
        .event-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .event-player {
            font-weight: 700;
            font-size: 16px;
        }

        .event-team {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        /* Download Button */
        .download-btn {
            position: fixed;
            bottom: 40px;
            left: 40px;
            padding: 20px 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .download-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 50px rgba(0, 212, 255, 0.6);
        }

        .download-btn:active {
            transform: translateY(-2px);
        }

        /* Weather Card */
        .weather-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 44, 191, 0.1));            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .weather-item {
            text-align: center;
            padding: 20px;
        }

        .weather-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .weather-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .weather-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        /* Predictions */
        .predictions-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .prediction-bars {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .prediction-item {
            flex: 1;            text-align: center;
        }

        .prediction-label {
            font-size: 14px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
        }

        .prediction-bar-bg {
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .prediction-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 1.5s ease;
            opacity: 0.7;
        }

        .prediction-value {
            position: relative;
            z-index: 1;
            font-weight: 700;
            font-size: 18px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .teams-container {
                flex-direction: column;
                gap: 30px;
            }

            .score-container {
                flex: 1;
            }

            .score {
                font-size: 48px;            }

            .header h1 {
                font-size: 32px;
            }

            .prediction-bars {
                flex-direction: column;
            }

            .match-card {
                padding: 30px 20px;
            }
        }

        /* Crystal Effect */
        .crystal {
            position: relative;
            overflow: hidden;
        }

        .crystal::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 70%
            );
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .crystal:hover::after {
            animation: crystalShine 0.5s ease;
        }

        @keyframes crystalShine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
                opacity: 0;
            }
            50% {
                opacity: 1;            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
                opacity: 0;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--primary), var(--accent));
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(var(--accent), var(--primary));
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader-container" id="loader">
        <div class="loader">
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-text">LOADING</div>
        </div>
    </div>

    <!-- Notification Dot -->
    <div class="notification-dot" id="notificationDot"></div>

    <!-- Background Animation -->
    <div class="bg-animation" id="bgAnimation"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚽ MATCH CENTER</h1>
            <div class="league-badge" id="leagueBadge">World Cup</div>
        </div>
        <!-- Match Card -->
        <div class="match-card crystal">
            <div class="match-content">
                <div class="teams-container">
                    <div class="team">
                        <img src="" alt="Home Team" class="team-logo" id="homeLogo">
                        <div class="team-name" id="homeTeam">Home</div>
                    </div>
                    
                    <div class="score-container">
                        <div class="score" id="score">0 - 0</div>
                        <div class="match-time">
                            <div class="live-indicator"></div>
                            <span id="matchTime">0'</span>
                        </div>
                    </div>

                    <div class="team">
                        <img src="" alt="Away Team" class="team-logo" id="awayLogo">
                        <div class="team-name" id="awayTeam">Away</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Weather -->
        <div class="weather-card" id="weatherCard" style="display: none;">
            <div class="weather-item">
                <div class="weather-icon">🌡️</div>
                <div class="weather-value" id="temperature">-</div>
                <div class="weather-label">الحرارة</div>
            </div>
            <div class="weather-item">
                <div class="weather-icon">💧</div>
                <div class="weather-value" id="humidity">-</div>
                <div class="weather-label">الرطوبة</div>
            </div>
            <div class="weather-item">
                <div class="weather-icon">💨</div>
                <div class="weather-value" id="wind">-</div>
                <div class="weather-label">الرياح</div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Predictions -->
        <div class="predictions-card" id="predictionsCard" style="display: none;">            <div class="section-title">
                <span>🔮</span>
                <span>التوقعات</span>
            </div>
            <div class="prediction-bars">
                <div class="prediction-item">
                    <div class="prediction-label" id="predHomeLabel">Home Win</div>
                    <div class="prediction-bar-bg">
                        <div class="prediction-bar-fill" id="predHomeBar" style="width: 0%"></div>
                        <div class="prediction-value" id="predHomeValue">0%</div>
                    </div>
                </div>
                <div class="prediction-item">
                    <div class="prediction-label">تعادل</div>
                    <div class="prediction-bar-bg">
                        <div class="prediction-bar-fill" id="predDrawBar" style="width: 0%"></div>
                        <div class="prediction-value" id="predDrawValue">0%</div>
                    </div>
                </div>
                <div class="prediction-item">
                    <div class="prediction-label" id="predAwayLabel">Away Win</div>
                    <div class="prediction-bar-bg">
                        <div class="prediction-bar-fill" id="predAwayBar" style="width: 0%"></div>
                        <div class="prediction-value" id="predAwayValue">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Events -->
        <div class="events-section">
            <div class="section-title">
                <span>📋</span>
                <span>أحداث المباراة</span>
            </div>
            <div class="events-timeline" id="eventsTimeline"></div>
        </div>
    </div>

    <!-- Download Button -->
    <button class="download-btn" onclick="downloadMatchData()">
        <span>⬇️</span>
        <span>تنزيل التقرير</span>
    </button>

    <script>
        // Global data storage
        let matchData = null;
        let lastEventCount = 0;
        // Create background particles
        function createParticles() {
            const container = document.getElementById('bgAnimation');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 10 + 5 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // Fetch match data
        async function fetchMatchData() {
            const headers = {
                'authority': 'api.wescore.com',
                'accept': 'application/json',
                'accept-language': 'ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7',
                'cache-control': 'max-age=0',
                'origin': 'https://wescore.com',
                'referer': 'https://wescore.com/',
                'sec-ch-ua': '"Chromium";v="139", "Not;A=Brand";v="99"',
                'sec-ch-ua-mobile': '?0',
                'sec-ch-ua-platform': '"Linux"',
                'sec-fetch-dest': 'empty',
                'sec-fetch-mode': 'cors',
                'sec-fetch-site': 'same-site',
                'user-agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36',
            };

            try {
                const response = await fetch(
                    'https://api.wescore.com/v4/fixtures/1103870/game?&league_id=0&User-IP=37.236.201.16&x-platform=web',
                    { headers }
                );
                const data = await response.json();
                matchData = data;
                updateUI(data);
                
                // Hide loader
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                }, 1500);
                
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loader').classList.add('hidden');            }
        }

        // Update UI with data
        function updateUI(data) {
            const fixture = data.fixture || {};
            const stats = data.statistics || [];
            const events = data.events || [];
            const environment = data.environment || {};
            const predictions = data.predictions || [];

            // Update match info
            const homeTeam = fixture.home_team?.name || 'Home';
            const awayTeam = fixture.away_team?.name || 'Away';
            
            document.getElementById('homeTeam').textContent = homeTeam;
            document.getElementById('awayTeam').textContent = awayTeam;
            document.getElementById('homeLogo').src = fixture.home_team?.image_url || '';
            document.getElementById('awayLogo').src = fixture.away_team?.image_url || '';
            document.getElementById('score').textContent = 
                `${fixture.goals_home || 0} - ${fixture.goals_away || 0}`;
            document.getElementById('matchTime').textContent = 
                `${fixture.elapsed || 0}' ${fixture.status === '2H' ? '(الشوط الثاني)' : ''}`;
            document.getElementById('leagueBadge').textContent = 
                `${fixture.league?.name || 'League'} - ${fixture.round || ''}`;

            // Update weather
            if (Object.keys(environment).length > 0) {
                document.getElementById('weatherCard').style.display = 'flex';
                document.getElementById('temperature').textContent = environment.temperature || '-';
                document.getElementById('humidity').textContent = environment.humidity || '-';
                document.getElementById('wind').textContent = environment.wind || '-';
            }

            // Update stats
            updateStats(stats, homeTeam, awayTeam);

            // Update events
            updateEvents(events);

            // Update predictions
            if (predictions.length > 0 && predictions[0]['1x2']) {
                document.getElementById('predictionsCard').style.display = 'block';
                const pred = predictions[0]['1x2'];
                const homeProb = (pred.home_probability * 100).toFixed(1);
                const drawProb = (pred.draw_probability * 100).toFixed(1);
                const awayProb = (pred.away_probability * 100).toFixed(1);

                document.getElementById('predHomeLabel').textContent = `${homeTeam} فوز`;
                document.getElementById('predAwayLabel').textContent = `${awayTeam} فوز`;                
                setTimeout(() => {
                    document.getElementById('predHomeBar').style.width = `${homeProb}%`;
                    document.getElementById('predDrawBar').style.width = `${drawProb}%`;
                    document.getElementById('predAwayBar').style.width = `${awayProb}%`;
                    document.getElementById('predHomeValue').textContent = `${homeProb}%`;
                    document.getElementById('predDrawValue').textContent = `${drawProb}%`;
                    document.getElementById('predAwayValue').textContent = `${awayProb}%`;
                }, 100);
            }
        }

        // Update statistics
        function updateStats(stats, homeTeam, awayTeam) {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';

            const statLabels = {
                ball_possession: { label: 'الاستحواذ', icon: '🔵', unit: '%' },
                total_shots: { label: 'إجمالي التسديدات', icon: '🎯', unit: '' },
                shots_on_goal: { label: 'تسديدات على المرمى', icon: '⚡', unit: '' },
                shots_off_goal: { label: 'تسديدات خارج المرمى', icon: '❌', unit: '' },
                blocked_shots: { label: 'تسديدات محجوبة', icon: '🛡️', unit: '' },
                corner_kicks: { label: 'ركنيات', icon: '🚩', unit: '' },
                fouls: { label: 'أخطاء', icon: '⚠️', unit: '' },
                yellow_cards: { label: 'بطاقات صفراء', icon: '🟨', unit: '' },
                red_cards: { label: 'بطاقات حمراء', icon: '🟥', unit: '' },
                offsides: { label: 'تسلل', icon: '📍', unit: '' },
                goalkeeper_saves: { label: 'تصديات الحارس', icon: '🧤', unit: '' },
                total_passes: { label: 'إجمالي التمريرات', icon: '📤', unit: '' },
                passes_accurate: { label: 'تمريرات دقيقة', icon: '✅', unit: '' },
            };

            if (stats.length >= 2) {
                const homeStats = stats[0];
                const awayStats = stats[1];

                for (const [key, config] of Object.entries(statLabels)) {
                    const homeVal = homeStats[key] || 0;
                    const awayVal = awayStats[key] || 0;
                    const total = homeVal + awayVal || 1;
                    const percentage = (homeVal / total) * 100;

                    const card = document.createElement('div');
                    card.className = 'stat-card crystal';
                    card.innerHTML = `
                        <div class="stat-label">
                            <span>${config.icon}</span>
                            <span>${config.label}</span>
                        </div>                        <div class="stat-values">
                            <span style="color: var(--primary)">${homeVal}${config.unit}</span>
                            <span style="color: var(--accent)">${awayVal}${config.unit}</span>
                        </div>
                        <div class="stat-bar">
                            <div class="stat-bar-fill" style="width: ${percentage}%"></div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            }
        }

        // Update events timeline
        function updateEvents(events) {
            const timeline = document.getElementById('eventsTimeline');
            const allEvents = [];

            events.forEach(teamEvent => {
                const teamName = teamEvent.team?.name || '';
                teamEvent.events?.forEach(event => {
                    allEvents.push({
                        team: teamName,
                        time: event.time || 0,
                        extra: event.time_extra || 0,
                        type: event.type || '',
                        player: event.player || '',
                        assist: event.assist || '',
                        detail: event.detail || ''
                    });
                });
            });

            allEvents.sort((a, b) => a.time - b.time);

            // Check for new events
            if (allEvents.length > lastEventCount) {
                showNotification();
            }
            lastEventCount = allEvents.length;

            timeline.innerHTML = '';
            
            const eventIcons = {
                goal: { icon: '⚽', class: 'goal', color: '#ffd700' },
                card: { icon: event => event.detail?.includes('yellow') ? '🟨' : '🟥', 
                       class: event => event.detail?.includes('yellow') ? 'card-yellow' : 'card-red' },
                subst: { icon: '🔄', class: 'substitution', color: '#00d4ff' },
                corner: { icon: '🚩', class: 'corner', color: '#7b2cbf' }
            };
            allEvents.forEach(event => {
                const config = eventIcons[event.type] || { icon: '📌', class: '', color: '#fff' };
                const icon = typeof config.icon === 'function' ? config.icon(event) : config.icon;
                const eventClass = typeof config.class === 'function' ? config.class(event) : config.class;
                
                let detail = '';
                if (event.type === 'goal') {
                    detail = `هدف! ${event.player}`;
                    if (event.assist) detail += ` (صناعة: ${event.assist})`;
                } else if (event.type === 'card') {
                    detail = `بطاقة ${event.detail?.includes('yellow') ? 'صفراء' : 'حمراء'} - ${event.player}`;
                } else if (event.type === 'subst') {
                    detail = `تبديل: ${event.player}`;
                    if (event.assist) detail += ` ← ${event.assist}`;
                } else if (event.type === 'corner') {
                    detail = 'ركنية';
                }

                const timeStr = event.extra ? `${event.time}'+${event.extra}` : `${event.time}'`;

                const eventEl = document.createElement('div');
                eventEl.className = `event-item ${eventClass}`;
                eventEl.innerHTML = `
                    <div class="event-time">${timeStr}</div>
                    <div class="event-details">
                        <span class="event-icon">${icon}</span>
                        <div>
                            <div class="event-player">${detail}</div>
                            <div class="event-team">${event.team}</div>
                        </div>
                    </div>
                `;
                timeline.appendChild(eventEl);
            });
        }

        // Show notification
        function showNotification() {
            const dot = document.getElementById('notificationDot');
            dot.classList.remove('active');
            void dot.offsetWidth; // Trigger reflow
            dot.classList.add('active');
            
            setTimeout(() => {
                dot.classList.remove('active');
            }, 3000);
        }

        // Download match report        function downloadMatchData() {
            if (!matchData) return;

            const fixture = matchData.fixture || {};
            const stats = matchData.statistics || [];
            const events = matchData.events || [];

            let report = `
═══════════════════════════════════════════════════
           📊 تقرير المباراة الشامل
═══════════════════════════════════════════════════

🏆 ${fixture.league?.name || 'League'} - ${fixture.round || ''}
📅 ${fixture.date || ''} | ⏰ ${fixture.hour || ''}

⚽ النتيجة النهائية
───────────────────────────────────────────────────
${fixture.home_team?.name || 'Home'} ${fixture.goals_home || 0} - ${fixture.goals_away || 0} ${fixture.away_team?.name || 'Away'}

⏱️ الوقت: ${fixture.elapsed || 0}' | الحالة: ${fixture.status || ''}

═══════════════════════════════════════════════════
📈 الإحصائيات
═══════════════════════════════════════════════════
`;

            if (stats.length >= 2) {
                const homeStats = stats[0];
                const awayStats = stats[1];
                const statLabels = {
                    ball_possession: 'الاستحواذ',
                    total_shots: 'إجمالي التسديدات',
                    shots_on_goal: 'تسديدات على المرمى',
                    corner_kicks: 'ركنيات',
                    fouls: 'أخطاء',
                    yellow_cards: 'بطاقات صفراء',
                    red_cards: 'بطاقات حمراء',
                    total_passes: 'إجمالي التمريرات',
                    passes_accurate: 'تمريرات دقيقة'
                };

                for (const [key, label] of Object.entries(statLabels)) {
                    report += `\n${label}:\n`;
                    report += `  ${fixture.home_team?.name}: ${homeStats[key] || 0}\n`;
                    report += `  ${fixture.away_team?.name}: ${awayStats[key] || 0}\n`;
                }
            }

            report += `\n\n═══════════════════════════════════════════════════\n📋 أحداث المباراة\n═══════════════════════════════════════════════════\n`;
            const allEvents = [];
            events.forEach(teamEvent => {
                const teamName = teamEvent.team?.name || '';
                teamEvent.events?.forEach(event => {
                    allEvents.push({
                        team: teamName,
                        time: event.time || 0,
                        type: event.type || '',
                        player: event.player || '',
                        detail: event.detail || ''
                    });
                });
            });

            allEvents.sort((a, b) => a.time - b.time);

            allEvents.forEach(event => {
                let desc = '';
                if (event.type === 'goal') desc = '⚽ هدف';
                else if (event.type === 'card') desc = event.detail?.includes('yellow') ? '🟨 بطاقة صفراء' : '🟥 بطاقة حمراء';
                else if (event.type === 'subst') desc = '🔄 تبديل';
                else if (event.type === 'corner') desc = '🚩 ركنية';
                
                report += `${event.time}' - ${desc} - ${event.player} (${event.team})\n`;
            });

            // Weather
            if (matchData.environment) {
                const env = matchData.environment;
                report += `\n\n═══════════════════════════════════════════════════\n🌤️ حالة الطقس\n═══════════════════════════════════════════════════\n`;
                report += `الحرارة: ${env.temperature || '-'}\n`;
                report += `الرطوبة: ${env.humidity || '-'}\n`;
                report += `الرياح: ${env.wind || '-'}\n`;
            }

            report += `\n\n═══════════════════════════════════════════════════\nتم إنشاء التقرير: ${new Date().toLocaleString('ar-EG')}\n═══════════════════════════════════════════════════\n`;

            // Download
            const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `match-report-${fixture.home_team?.name || 'home'}-vs-${fixture.away_team?.name || 'away'}-${fixture.date || ''}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // Show success animation
            const btn = document.querySelector('.download-btn');            const originalText = btn.innerHTML;
            btn.innerHTML = '<span>✅</span><span>تم التنزيل!</span>';
            btn.style.background = 'linear-gradient(135deg, #00ff88, #00d4ff)';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
            }, 2000);
        }

        // Auto-refresh every 30 seconds for live matches
        function startAutoRefresh() {
            setInterval(() => {
                if (matchData?.fixture?.status === '1H' || matchData?.fixture?.status === '2H') {
                    fetchMatchData();
                }
            }, 30000);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            createParticles();
            fetchMatchData();
            startAutoRefresh();
        });

        // Visibility change - refresh when tab becomes visible
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                fetchMatchData();
            }
        });
    </script>
</body>
</html>
