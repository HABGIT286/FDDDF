<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exclusive View</title>
    <style>
        /* --- إعادة التعيين والحماية الأساسية --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important; /* منع قائمة الحفظ في الهاتف */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- خلفية محيطية فاخرة (لتعطي عمقاً للإطار) --- */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, #1a1500 0%, #000000 70%);
            z-index: 1;
        }

        /* --- الإطار السينمائي الفاخر --- */
        .cinematic-frame {
            position: relative;
            width: 92vw;
            height: 85vh; /* مثالي للشاشة العمودية */
            max-width: 500px;
            border-radius: 24px;
            overflow: hidden;            z-index: 10;
            /* تأثير الإطار الذهبي المتوهج الفاخر */
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 
                0 0 0 1px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(212, 175, 55, 0.15),
                inset 0 0 30px rgba(0, 0, 0, 0.9);
            animation: frameGlow 4s ease-in-out infinite alternate;
        }

        @keyframes frameGlow {
            0% { box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 0 30px rgba(212, 175, 55, 0.1), inset 0 0 30px rgba(0,0,0,0.9); }
            100% { box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 0 60px rgba(212, 175, 55, 0.25), inset 0 0 30px rgba(0,0,0,0.9); }
        }

        /* --- الفيديو --- */
        .cinematic-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* يملأ الإطار بالكامل بدون تشويه أو هوامش سوداء */
            display: block;
            pointer-events: none; /* منع أي تفاعل مباشر مع الفيديو */
        }

        /* --- طبقة الحماية الشفافة (فوق الفيديو مباشرة) --- */
        .security-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            background: transparent;
        }

        /* --- علامة مائية متحركة خفية جداً (تظهر فقط عند التصوير) --- */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 1.5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03); /* شفافة جداً لا تُرى بالعين المجردة بسهولة */
            pointer-events: none;
            z-index: 15;
            white-space: nowrap;
            animation: watermarkFloat 10s linear infinite;
        }
        @keyframes watermarkFloat {
            0% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
            50% { transform: translate(-40%, -60%) rotate(-45deg) scale(1.1); }
            100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
        }

        /* --- تأثير التشويش عند محاولة الخروج --- */
        .blur-protect {
            filter: blur(30px) brightness(0.1) !important;
            transition: filter 0.1s ease;
        }
    </style>
</head>
<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;">

    <div class="ambient-bg"></div>

    <div class="cinematic-frame" id="mainFrame">
        <!-- طبقة الحماية التي تمنع السحب والنقر -->
        <div class="security-overlay"></div>
        
        <!-- علامة مائية خفية -->
        <div class="watermark">PROTECTED CONTENT</div>

        <!-- الفيديو: autoplay و muted ضروريان للتشغيل التلقائي الفوري في جميع المتصفحات -->
        <video id="mainVideo" src="FF.mp4" autoplay loop playsinline muted disablePictureInPicture></video>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const frame = document.getElementById('mainFrame');

        // 1. الحماية القصوى من تصوير الشاشة (تشويش فوري عند مغادرة المتصفح أو فتح قائمة التطبيقات)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                video.pause();
                frame.classList.add('blur-protect');
            } else {
                frame.classList.remove('blur-protect');
                video.play();
            }
        });

        // 2. منع زر PrintScreen في أجهزة الكمبيوتر
        document.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                navigator.clipboard.writeText(''); // مسح الحافظة
                frame.classList.add('blur-protect');
                setTimeout(() => { frame.classList.remove('blur-protect'); }, 2000);
            }        });

        // 3. منع النقر بزر الماوس الأيمن تماماً
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 4. منع الضغط المطول (Long Press) في الهواتف لمنع ظهور قائمة "حفظ الفيديو"
        document.addEventListener('touchstart', function(e) {
            e.preventDefault();
        }, { passive: false });

        // 5. منع السحب والإفلات
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });

        // 6. تعطيل أي محاولة للتحكم في الفيديو أو تنزيله
        video.setAttribute('oncontextmenu', 'return false;');
        video.setAttribute('controlslist', 'nodownload nofullscreen noremoteplayback');
        
        // محاولة إجبار الفيديو على البقاء صامتاً لكن عاملاً (لضمان التشغيل التلقائي)
        video.muted = true;
    </script>
</body>
</html>
