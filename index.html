<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Lookup Pro | MOTRXVIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #fe2c55;
            --secondary: #25f4ee;
            --dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --glow-1: rgba(254, 44, 85, 0.4);
            --glow-2: rgba(37, 244, 238, 0.4);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 15s infinite ease-in-out;
        }
        .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--glow-1);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--glow-2);
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: rgba(138, 43, 226, 0.3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(40px, 40px) scale(1.05); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% { opacity: 1; }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease;
        }

        .header .logo {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-shadow: 0 0 30px var(--glow-1);
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }
        .search-section {
            width: 100%;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 8px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--glow-1), 0 0 40px rgba(254, 44, 85, 0.1);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            padding: 12px 16px;
            direction: ltr;
            text-align: right;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), #ff6b8a);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px var(--glow-1);
        }

        .search-btn:active {
            transform: scale(0.95);
        }

        .search-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .search-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            display: none;
            animation: fadeInUp 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary));
            border-radius: 25px;            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
        }

        .result-card:hover::before {
            opacity: 0.5;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .result-card.show {
            display: block;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .profile-pic-wrapper {
            position: relative;
        }

        .profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(var(--dark), var(--dark)) padding-box,
                        linear-gradient(135deg, var(--primary), var(--secondary)) border-box;
            animation: pulse-border 3s ease infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 10px var(--glow-1); }
            50% { box-shadow: 0 0 25px var(--glow-2); }
        }

        .verified-badge {
            position: absolute;
            bottom: 2px;            right: 2px;
            width: 24px;
            height: 24px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--dark);
            border: 2px solid var(--dark);
            display: none;
        }

        .verified-badge.show {
            display: flex;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-username {
            color: var(--secondary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .profile-username:hover {
            color: #fff;        }

        .copy-icon {
            font-size: 0.8rem;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .copy-icon:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s;
        }

        .stat-card:hover::after {
            left: 100%;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .bio-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 25px;
            position: relative;
        }

        .bio-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bio-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.85);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .copy-bio-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;            padding: 6px 10px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }

        .copy-bio-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status-badge.taken {
            background: rgba(254, 44, 85, 0.15);
            color: var(--primary);
            border: 1px solid rgba(254, 44, 85, 0.3);
        }

        .status-badge.available {
            background: rgba(37, 244, 238, 0.15);
            color: var(--secondary);
            border: 1px solid rgba(37, 244, 238, 0.3);
        }

        .status-badge.private {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        .taken .status-dot { background: var(--primary); }
        .available .status-dot { background: var(--secondary); }        .private .status-dot { background: #ffc107; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 20px;
            border-radius: 14px;
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .action-btn.tiktok {
            background: linear-gradient(135deg, var(--primary), #ff6b8a);
            color: #fff;
        }

        .action-btn.tiktok:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--glow-1);
        }

        .action-btn.telegram {
            background: linear-gradient(135deg, #0088cc, #00bbff);
            color: #fff;
        }

        .action-btn.telegram:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.4);
        }
        .action-btn.copy-all {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .action-btn.copy-all:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .error-msg {
            text-align: center;
            padding: 30px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            display: none;
            width: 100%;
            animation: fadeInUp 0.5s ease;
        }

        .error-msg.show {
            display: block;
        }

        .error-msg i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .error-msg.error i { color: var(--primary); }
        .error-msg.available i { color: var(--secondary); }

        .error-msg h3 {
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .error-msg p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(37, 244, 238, 0.9);
            color: var(--dark);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 1000;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .footer a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 700;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);            }
        }

        .method-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .method-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 8px 16px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .method-btn.active {
            background: rgba(254, 44, 85, 0.2);
            border-color: var(--primary);
            color: #fff;
        }

        .method-btn:hover {
            border-color: var(--primary);
            color: #fff;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            .header .logo { font-size: 2rem; }
            .profile-section { flex-direction: column; text-align: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .actions { flex-direction: column; }
            .action-btn { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fab fa-tiktok"></i> TikTok Lookup
            </div>
            <p>ابحث عن معلومات أي مستخدم تيك توك</p>
        </div>

        <div class="search-section">
            <div class="method-selector">
                <button class="method-btn active" onclick="setMethod('proxy1')">الطريقة 1</button>
                <button class="method-btn" onclick="setMethod('proxy2')">الطريقة 2</button>
                <button class="method-btn" onclick="setMethod('proxy3')">الطريقة 3</button>
                <button class="method-btn" onclick="setMethod('all')">تجربة الكل</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="usernameInput" placeholder="أدخل اسم المستخدم..." autocomplete="off">
                <button class="search-btn" id="searchBtn" onclick="searchUser()">
                    <i class="fas fa-search"></i>
                    <span>بحث</span>
                </button>
            </div>
        </div>

        <div class="error-msg" id="errorMsg">
            <i class="fas fa-exclamation-triangle"></i>
            <h3 id="errorTitle">خطأ</h3>
            <p id="errorText">حدث خطأ في البحث</p>
        </div>

        <div class="result-card" id="resultCard">
            <div id="statusBadge" class="status-badge taken">
                <span class="status-dot"></span>
                <span id="statusText">مستخدم</span>
            </div>

            <div class="profile-section">
                <div class="profile-pic-wrapper">
                    <img class="profile-pic" id="profilePic" src="" alt="Profile">
                    <div class="verified-badge" id="verifiedBadge">
                        <i class="fas fa-check"></i>
                    </div>
                </div>
                <div class="profile-info">
                    <div class="profile-name" id="profileName">-</div>
                    <div class="profile-username" id="profileUsername" onclick="copyText(this.dataset.username)">                        <span id="usernameText">@-</span>
                        <i class="fas fa-copy copy-icon" title="نسخ"></i>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="followersCount">0</div>
                    <div class="stat-label"><i class="fas fa-users"></i> متابعين</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="followingCount">0</div>
                    <div class="stat-label"><i class="fas fa-user-plus"></i> يتابع</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="likesCount">0</div>
                    <div class="stat-label"><i class="fas fa-heart"></i> إعجابات</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="videosCount">0</div>
                    <div class="stat-label"><i class="fas fa-video"></i> فيديوهات</div>
                </div>

            <div class="bio-section">
                <div class="bio-label"><i class="fas fa-info-circle"></i> النبذة التعريفية</div>
                <div class="bio-text" id="bioText">-</div>
                <button class="copy-bio-btn" onclick="copyBio()">
                    <i class="fas fa-copy"></i> نسخ
                </button>
            </div>

            <div class="actions">
                <a class="action-btn tiktok" id="tiktokLink" href="#" target="_blank">
                    <i class="fab fa-tiktok"></i> فتح تيك توك
                </a>
                <a class="action-btn telegram" href="https://t.me/MOTRXVIP" target="_blank">
                    <i class="fab fa-telegram-plane"></i> تواصل معي
                </a>
                <button class="action-btn copy-all" onclick="copyAllInfo()">
                    <i class="fas fa-clipboard"></i> نسخ الكل
                </button>
            </div>
        </div>

        <div class="footer">
            <p>صنع بـ ❤️ بواسطة <a href="https://t.me/MOTRXVIP" target="_blank">@MOTRXVIP</a></p>
        </div>
    </div>
    <div class="toast" id="toast">تم النسخ ✓</div>

    <script>
        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 8 + 4) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.width = (Math.random() * 3 + 1) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        createParticles();

        let currentMethod = 'proxy1';

        // CORS Proxies
        const PROXIES = {
            proxy1: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            proxy2: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            proxy3: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
        };

        function setMethod(method) {
            currentMethod = method;
            document.querySelectorAll('.method-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(method)) {
                    btn.classList.add('active');
                }
            });
        }

        async function searchUser() {
            const username = document.getElementById('usernameInput').value.trim().replace('@', '');
            if (!username) {
                showError('تنبيه', 'الرجاء إدخال اسم المستخدم أولاً');
                return;
            }

            const btn = document.getElementById('searchBtn');
            btn.classList.add('loading');
            btn.innerHTML = '<i class="fas fa-spinner"></i><span>جاري البحث...</span>';
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');

            const apiUrl = `https://api.instantusername.com/p/tiktok/${username}`;
            
            try {
                let data;
                
                if (currentMethod === 'all') {
                    data = await tryAllProxies(apiUrl);
                } else {
                    data = await fetchWithProxy(apiUrl, currentMethod);
                }

                if (data) {
                    if (data.status === 'taken' && data.profile) {
                        displayProfile(data);
                    } else if (data.status === 'available') {
                        showAvailable(username);
                    } else {
                        showError('خطأ', 'لم يتم العثور على المستخدم');
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                showError('خطأ في الاتصال', `تعذر جلب البيانات. ${error.message}`);
            }

            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-search"></i><span>بحث</span>';
        }

        async function fetchWithProxy(url, methodName) {
            const proxyFn = PROXIES[methodName];
            if (!proxyFn) throw new Error('طريقة غير صحيحة');

            const proxyUrl = proxyFn(url);
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            try {
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Origin': 'https://instantusername.com',
                        'Referer': 'https://instantusername.com/'
                    },
                    signal: controller.signal                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        async function tryAllProxies(url) {
            const methods = Object.keys(PROXIES);
            let lastError = null;

            for (const method of methods) {
                try {
                    console.log(`Trying ${method}...`);
                    const data = await fetchWithProxy(url, method);
                    if (data) return data;
                } catch (error) {
                    lastError = error;
                    console.log(`${method} failed:`, error.message);
                    continue;
                }
            }

            throw lastError || new Error('All proxies failed');
        }

        function displayProfile(data) {
            const profile = data.profile;

            const picUrl = profile.profile_pic_url || 'https://via.placeholder.com/90?text=?';
            document.getElementById('profilePic').src = picUrl;
            document.getElementById('profilePic').onerror = function() {
                this.src = 'https://via.placeholder.com/90?text=' + profile.username[0].toUpperCase();
            };

            document.getElementById('profileName').textContent = profile.full_name || profile.username;
            document.getElementById('usernameText').textContent = '@' + profile.username;
            document.getElementById('profileUsername').dataset.username = profile.username;

            const badge = document.getElementById('verifiedBadge');
            if (profile.is_verified) {
                badge.classList.add('show');            } else {
                badge.classList.remove('show');
            }

            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');
            statusBadge.className = 'status-badge';

            if (profile.is_private) {
                statusBadge.classList.add('private');
                statusText.textContent = '🔒 حساب خاص';
            } else {
                statusBadge.classList.add('taken');
                statusText.textContent = '✓ حساب مستخدم';
            }

            animateNumber('followersCount', profile.followers || 0);
            animateNumber('followingCount', profile.following || 0);
            animateNumber('likesCount', profile.likes || 0);
            animateNumber('videosCount', profile.videos || 0);

            document.getElementById('bioText').textContent = profile.bio || 'لا توجد نبذة تعريفية';
            document.getElementById('tiktokLink').href = profile.profile_url || `https://www.tiktok.com/@${profile.username}`;

            document.getElementById('resultCard').classList.add('show');
        }

        function showAvailable(username) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.className = 'error-msg available show';
            errorMsg.querySelector('i').className = 'fas fa-check-circle';
            document.getElementById('errorTitle').textContent = 'اسم المستخدم متاح! ✓';
            document.getElementById('errorText').textContent = `@${username} غير مستخدم على تيك توك`;
            
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 5000);
        }

        function animateNumber(elementId, target) {
            const el = document.getElementById(elementId);
            const duration = 1500;
            const start = 0;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * eased);                el.textContent = formatNumber(current);

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('تم نسخ اسم المستخدم ✓');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('تم نسخ اسم المستخدم ✓');
            });
        }

        function copyBio() {
            const bio = document.getElementById('bioText').textContent;
            navigator.clipboard.writeText(bio).then(() => {
                showToast('تم نسخ النبذة ✓');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = bio;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('تم نسخ النبذة ✓');
            });
        }

━━━━━━━━━━━━━━
👤 الاسم: ${name}
🔖 اليوزر: ${username}
👥 المتابعين: ${followers}
➕ يتابع: ${following}

🎬 الفيديوهات: ${videos}

━━━━━━━━━━━━━━

            navigator.clipboard.writeText(info).then(() => {

            }).catch(() => {
                const textarea = document.createElement('textarea');

                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('تم نسخ جميع المعلومات ✓');
            });
        }

        function showError(title, msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.className = 'error-msg error show';
            errorMsg.querySelector('i').className = 'fas fa-exclamation-triangle';
            document.getElementById('errorTitle').textContent = title;
            document.getElementById('errorText').textContent = msg;
            
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 5000);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.getElementById('usernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchUser();
        });    </script>
