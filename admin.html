    // ===== تهيئة Supabase =====
    function initSupabase() {
        try {
            // استخدام window.supabase لتجنب التضارب
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase SDK غير محمّل!');
                updateConnectionStatus('disconnected', 'SDK غير محمّل');
                return false;
            }
            
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ تم تهيئة Supabase بنجاح');
            return true;
        } catch (error) {
            console.error('❌ خطأ في تهيئة Supabase:', error);
            updateConnectionStatus('disconnected', 'خطأ في التهيئة');
            return false;
        }
    }

    // ===== Connection Status =====
    function updateConnectionStatus(status, text) {
        const el = document.getElementById('connectionStatus');
        const textEl = document.getElementById('connectionText');
        if (el && textEl) {
            el.className = 'connection-status ' + status;
            textEl.textContent = text;
        }
    }

    // ===== Test Connection =====
    async function testConnection() {
        if (!supabaseClient) {
            console.error('❌ Supabase client غير موجود');
            updateConnectionStatus('disconnected', 'غير متصل');
            return false;
        }
        
        try {
            console.log('🔄 اختبار الاتصال...');
            const { data, error } = await supabaseClient
                .from('settings')
                .select('key')
                .limit(1);
            
            if (error) {
                console.error('❌ خطأ في الاتصال:', error);
                updateConnectionStatus('disconnected', 'خطأ في الاتصال');
                return false;
            }
            
            console.log('✅ الاتصال ناجح');
            updateConnectionStatus('connected', 'متصل بـ Supabase');
            return true;
        } catch (error) {
            console.error('❌ استثناء في الاتصال:', error);
            updateConnectionStatus('disconnected', 'غير متصل');
            return false;
        }
    }

    // ===== Realtime Subscriptions =====
    function setupRealtime() {
        if (!supabaseClient) return;
        
        try {
            // Orders changes
            supabaseClient
                .channel('orders-changes')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'orders' },
                    (payload) => {
                        console.log('Order changed:', payload);
                        if (payload.eventType === 'INSERT') {
                            showToast('🔔 طلب جديد!');
                            updateStats();
                            loadRecentOrders();
                            addNotification('طلب جديد', `طلب من ${payload.new.name || 'غير معروف'}`);
                        } else if (payload.eventType === 'DELETE') {
                            updateStats();
                            loadRecentOrders();
                        }
                    }
                )
                .subscribe();

            // Settings changes
            supabaseClient
                .channel('settings-changes')
                .on('postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'settings' },
                    (payload) => {
                        console.log('Setting changed:', payload);
                        showToast('⚙️ تم تحديث الإعدادات');
                    }
                )
                .subscribe();

            // Banned changes
            supabaseClient
                .channel('banned-changes')
                .on('postgres_changes',
                    { event: '*', schema: 'public', table: 'banned' },
                    () => {
                        loadBannedList();
                    }
                )
                .subscribe();
                
            console.log('✅ تم إعداد Realtime');
        } catch (error) {
            console.error('❌ خطأ في Realtime:', error);
        }
    }

    // ===== Login System =====
    const pinInputs = document.querySelectorAll('.pin-digit');
    
    pinInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            const value = e.target.value;
            if (value) {
                e.target.classList.add('filled');
                if (index < pinInputs.length - 1) {
                    pinInputs[index + 1].focus();
                }
            } else {
                e.target.classList.remove('filled');
            }
            checkPinComplete();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                pinInputs[index - 1].focus();
            }
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });
    });

    function checkPinComplete() {
        const pin = Array.from(pinInputs).map(i => i.value).join('');
        if (pin.length === 5) {
            setTimeout(attemptLogin, 300);
        }
    }

    async function attemptLogin() {
        console.log('🔄 محاولة تسجيل الدخول...');
        
        const pin = Array.from(pinInputs).map(i => i.value).join('');
        const errorEl = document.getElementById('loginError');
        
        if (!pin || pin.length < 5) {
            console.log('⚠️ كلمة المرور غير مكتملة');
            return;
        }
        
        // تحميل بيانات المسؤول إذا لم تكن محملة
        if (!CORRECT_PIN) {
            console.log('🔄 تحميل بيانات المسؤول أولاً...');
            await loadAdminCredentials();
        }
        
        console.log('🔍 مقارنة كلمة المرور...');
        console.log('المُدخلة:', pin);
        console.log('المخزنة:', CORRECT_PIN);
        
        if (pin === CORRECT_PIN) {
            console.log('✅ كلمة المرور صحيحة!');
            errorEl.textContent = '';
            
            // تحديث last_login
            if (supabaseClient) {
                try {
                    await supabaseClient
                        .from('admins')
                        .update({ last_login: new Date().toISOString() })
                        .eq('username', 'admin');
                } catch (e) {
                    console.error('خطأ في تحديث last_login:', e);
                }
            }
            
            document.getElementById('loginScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContainer').classList.add('active');
                initializeDashboard();
            }, 500);
        } else {
            console.log('❌ كلمة المرور خاطئة');
            errorEl.textContent = '❌ رمز الدخول غير صحيح';
            pinInputs.forEach(i => {
                i.value = '';
                i.classList.remove('filled');
            });
            pinInputs[0].focus();
            
            const box = document.querySelector('.login-box');
            box.style.animation = 'none';
            setTimeout(() => {
                box.style.animation = 'shake 0.5s';
            }, 10);
        }
    }

    function logout() {
        if (confirm('هل تريد تسجيل الخروج؟')) {
            document.getElementById('adminContainer').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginScreen').style.opacity = '1';
            pinInputs.forEach(i => {
                i.value = '';
                i.classList.remove('filled');
            });
        }
    }

    // ===== Navigation =====
    function showSection(sectionId, element) {
        document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');

    // ===== Initialize Dashboard =====
    async function initializeDashboard() {
        console.log('🚀 تهيئة لوحة التحكم...');
        updateConnectionStatus('syncing', 'جاري التحميل...');
        
        await testConnection();
        setupRealtime();
        await updateStats();
        await loadRecentOrders();
        await updateSiteStatusBadge();
    }

    // ===== Settings Helpers =====
    async function getSetting(key) {
        if (!supabaseClient) return null;
        
        try {
            const { data, error } = await supabaseClient
                .from('settings')
                .select('value')
                .eq('key', key)
                .single();
            
            if (error) {
                console.error(`Error getting ${key}:`, error);
                return null;
            }
            return data ? data.value : null;
        } catch (error) {
            console.error(`Exception getting ${key}:`, error);
            return null;
        }
    }

    async function setSetting(key, value) {
        if (!supabaseClient) return false;
        
        try {
            const { error } = await supabaseClient
                .from('settings')
                .upsert({ 
                    key: key, 
                    value: value, 
                    updated_at: new Date().toISOString() 
                });
            
            if (error) {
                console.error('Error saving setting:', error);
                return false;
            }
            return true;
        } catch (error) {
            console.error('Exception saving setting:', error);
            return false;
        }
    }

    // ===== Statistics =====
    async function updateStats() {
        if (!supabaseClient) return;
        
        try {
            const { data: orders } = await supabaseClient.from('orders').select('*');
            const { data: banned } = await supabaseClient.from('banned').select('*');
            
            const ordersList = orders || [];
            const bannedList = banned || [];
            const today = new Date().toDateString();
            
            document.getElementById('stat-orders').textContent = ordersList.length;
            document.getElementById('stat-bookings').textContent = 
                ordersList.filter(o => o.type === 'booking' && new Date(o.created_at).toDateString() === today).length;
            document.getElementById('stat-market').textContent = 
                ordersList.filter(o => o.type === 'sell' || o.type === 'buy').length;
            document.getElementById('stat-banned').textContent = bannedList.length;
        } catch (error) {
            console.error('Error updating stats:', error);
        }
    }

    // ===== Orders =====
    async function loadRecentOrders() {
        if (!supabaseClient) return;
        
        try {
            const { data: orders, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(5);
            
            const container = document.getElementById('recentOrders');
            
            if (error || !orders || orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>لا توجد طلبات حتى الآن</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(renderOrderCard).join('');
        } catch (error) {
            console.error('Error loading orders:', error);
        }
    }

    async function loadAllOrders() {
        if (!supabaseClient) return;
        
        try {
            const { data: orders, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('allOrders');
            
            if (error || !orders || orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>لا توجد طلبات</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(renderOrderCard).join('');
        } catch (error) {
            console.error('Error loading all orders:', error);
        }
    }

    function renderOrderCard(order) {
        const typeLabels = {
            'booking': { label: 'حجز', color: 'var(--primary)', icon: 'fa-calendar-check' },
            'sell': { label: 'بيع', color: 'var(--gold)', icon: 'fa-tag' },
            'buy': { label: 'شراء', color: 'var(--active-color)', icon: 'fa-shopping-cart' },
            'message': { label: 'رسالة', color: 'var(--accent)', icon: 'fa-envelope' }
        };
        
        const type = typeLabels[order.type] || typeLabels.booking;
        const location = (order.location_lat && order.location_lon) 
            ? `https://www.google.com/maps?q=${order.location_lat},${order.location_lon}` 
            : '';
        
        return `
            <div class="order-card">
                <div class="order-header">
                    <div class="order-id">
                        <i class="fas ${type.icon}" style="color: ${type.color};"></i>
                        ${order.request_id || order.id}
                        <span style="background: ${type.color}; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 0.8em; margin-right: 10px;">${type.label}</span>
                    </div>
                    <div class="order-time">
                        <i class="fas fa-clock"></i> ${new Date(order.created_at).toLocaleString('ar-IQ')}
                    </div>
                </div>
                <div class="order-info">
                    <div class="order-info-item">
                        <i class="fas fa-user"></i>
                        <span>${order.name || 'غير محدد'}</span>
                    </div>
                    <div class="order-info-item">
                        <i class="fas fa-phone"></i>
                        <span>${order.phone || 'غير محدد'}</span>
                    </div>
                    <div class="order-info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>${order.area || 'غير محدد'}</span>
                    </div>
                    ${order.service_type ? `<div class="order-info-item"><i class="fas fa-concierge-bell"></i><span>${order.service_type}</span></div>` : ''}
                </div>
                <div class="order-actions">
                    <a href="tel:${order.phone}" class="btn btn-success">
                        <i class="fas fa-phone"></i> اتصال
                    </a>
                    ${location ? `<a href="${location}" target="_blank" class="btn btn-warning"><i class="fas fa-map"></i> الموقع</a>` : ''}
                    <button class="btn btn-danger" onclick="deleteOrder('${order.id}')">
                        <i class="fas fa-trash"></i> حذف
                    </button>
                    <button class="btn btn-outline" onclick="banUserByPhone('${order.phone}')">
                        <i class="fas fa-ban"></i> حظر
                    </button>
                </div>
            </div>
        `;
    }

    async function deleteOrder(orderId) {
        if (!confirm('هل تريد حذف هذا الطلب؟')) return;
        if (!supabaseClient) return;
        
        try {
            const { error } = await supabaseClient.from('orders').delete().eq('id', orderId);
            
            if (error) {
                showToast('❌ حدث خطأ في الحذف', 'error');
                return;
            }
            
            showToast('✅ تم حذف الطلب');
            updateStats();
            loadRecentOrders();
            loadAllOrders();
        } catch (error) {
            console.error('Error deleting order:', error);
            showToast('❌ حدث خطأ', 'error');
        }
    }

    async function searchOrders() {
        if (!supabaseClient) return;
        
        const query = document.getElementById('orderSearch').value.toLowerCase();
        
        if (!query) {
            loadAllOrders();
            return;
        }
        
        try {
            const { data: orders } = await supabaseClient
                .from('orders')
                .select('*')
                .or(`id.ilike.%${query}%,name.ilike.%${query}%,phone.ilike.%${query}%`)
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('allOrders');
            
            if (!orders || orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>لا توجد نتائج</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(renderOrderCard).join('');
        } catch (error) {
            console.error('Error searching orders:', error);
        }
    }

    async function clearAllOrders() {
        if (!confirm('⚠️ هل أنت متأكد من حذف جميع الطلبات؟')) return;
        if (!confirm('⚠️ تأكيد نهائي!')) return;
        if (!supabaseClient) return;
        
        try {
            const { error } = await supabaseClient.from('orders').delete().neq('id', '');
            
            if (error) {
                showToast('❌ حدث خطأ', 'error');
                return;
            }
            
            showToast('✅ تم حذف جميع الطلبات');
            updateStats();
            loadRecentOrders();
            loadAllOrders();
        } catch (error) {
            console.error('Error clearing orders:', error);
            showToast('❌ حدث خطأ', 'error');
        }
    }

    // ===== Site Status =====
    function selectStatus(status) {
        document.querySelectorAll('.status-option').forEach(el => {
            el.classList.remove('selected');
        });
        document.querySelector(`.status-option[data-status="${status}"]`).classList.add('selected');
        currentStatus = status;
    }

    async function saveSiteStatus() {
        const success = await setSetting('siteStatus', currentStatus);
        
        if (success) {
            showToast('✅ تم حفظ الحالة');
            updateSiteStatusBadge();
        } else {
            showToast('❌ حدث خطأ', 'error');
        }
    }

    async function updateSiteStatusBadge() {
        const status = await getSetting('siteStatus') || 'active';
        const badge = document.getElementById('siteStatusBadge');
        const text = document.getElementById('siteStatusText');
        
        const statusMap = {
            'active': { text: 'نشط', class: 'active' },
            'inactive': { text: 'غير نشط', class: 'locked' },
            'break': { text: 'استراحة', class: 'locked' },
            'busy': { text: 'مشغول', class: 'locked' }
        };
        
        const info = statusMap[status] || statusMap.active;
        badge.className = 'site-status-badge ' + info.class;
        text.textContent = info.text;
        
        document.querySelectorAll('.status-option').forEach(el => {
            el.classList.toggle('selected', el.dataset.status === status);
        });
    }

    // ===== Sections Control =====
    async function loadSectionsControl() {
        const sections = await getSetting('sections') || {
            home: true, gallery: true, services: true,
            marketplace: true, booking: true, contact: true
        };
        
        const sectionsList = [
            { id: 'home', name: 'الرئيسية', icon: 'fa-home' },
            { id: 'gallery', name: 'المعرض', icon: 'fa-images' },
            { id: 'services', name: 'الخدمات', icon: 'fa-tools' },
            { id: 'marketplace', name: 'بيع وشراء', icon: 'fa-store' },
            { id: 'booking', name: 'الحجز', icon: 'fa-calendar-check' },
            { id: 'contact', name: 'التواصل', icon: 'fa-phone' }
        ];
        
        const container = document.getElementById('sectionToggles');
        container.innerHTML = sectionsList.map(section => `
            <div class="section-toggle ${sections[section.id] !== false ? 'enabled' : 'disabled'}" data-section="${section.id}">
                <div class="section-toggle-info">
                    <i class="fas ${section.icon}"></i>
                    <div>
                        <div style="font-weight: 600;">${section.name}</div>
                        <div style="font-size: 0.85em; color: rgba(255,255,255,0.5);">
                            ${sections[section.id] !== false ? 'مفعّل' : 'معطّل'}
                        </div>
                    </div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" ${sections[section.id] !== false ? 'checked' : ''} onchange="toggleSection('${section.id}', this)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        `).join('');
    }

    let tempSections = {};

    function toggleSection(sectionId, checkbox) {
        tempSections[sectionId] = checkbox.checked;
        const toggle = checkbox.closest('.section-toggle');
        toggle.className = 'section-toggle ' + (checkbox.checked ? 'enabled' : 'disabled');
    }

    async function saveSectionsState() {
        const currentSections = await getSetting('sections') || {};
        const newSections = { ...currentSections, ...tempSections };
        
        const success = await setSetting('sections', newSections);
        
        if (success) {
            showToast('✅ تم حفظ حالة الأقسام');
            tempSections = {};
        } else {
            showToast('❌ حدث خطأ', 'error');
        }
    }

    // ===== Lock Site =====
    async function lockSite() {
        const message = document.getElementById('lockMessage').value || 'الموقع مغلق للصيانة، سنعود قريباً...';
        if (!confirm('هل تريد قفل الموقع؟')) return;
        
        await setSetting('siteLocked', true);
        await setSetting('lockMessage', message);
        showToast('🔒 تم قفل الموقع');
    }

    async function unlockSite() {
        if (!confirm('هل تريد فتح الموقع؟')) return;
        await setSetting('siteLocked', false);
        showToast('🔓 تم فتح الموقع');
    }

    // ===== Images Management =====
    async function loadImagesManagement() {
        if (!supabaseClient) return;
        
        try {
            const { data: images } = await supabaseClient.from('images').select('*');
            const imagesMap = {};
            (images || []).forEach(img => {
                imagesMap[img.key] = img.url;
            });
            
            const sliderGrid = document.getElementById('sliderImagesGrid');
            sliderGrid.innerHTML = '';
            for (let i = 1; i <= 18; i++) {
                sliderGrid.appendChild(createImageItem(`S${i}`, imagesMap[`S${i}`] || `S${i}.jpg`));
            }
            
            const galleryGrid = document.getElementById('galleryImagesGrid');
            galleryGrid.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                galleryGrid.appendChild(createImageItem(`${i}`, imagesMap[`${i}`] || `${i}.jpg`));
            }
            
            const techGrid = document.getElementById('techniciansImagesGrid');
            techGrid.innerHTML = '';
            for (let i = 1; i <= 3; i++) {
                techGrid.appendChild(createImageItem(`A${i}`, imagesMap[`A${i}`] || `A${i}.jpg`));
            }

    function createImageItem(key, url) {
        const div = document.createElement('div');
        div.className = 'image-item';
        div.innerHTML = `
            <img src="${url}" alt="${key}" onerror="this.src='https://via.placeholder.com/150/00d4ff/ffffff?text=${key}'">
            <div class="image-label">${key}</div>
            <div class="image-actions">
                <button class="image-action-btn edit" onclick="event.stopPropagation(); uploadImage('${key}')">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="image-action-btn delete" onclick="event.stopPropagation(); deleteImage('${key}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `;
        div.onclick = () => uploadImage(key);
        return div;
    }

    function uploadImage(key) {
        currentUploadTarget = key;
        document.getElementById('imageUploader').click();
    }

    async function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file || !currentUploadTarget || !supabaseClient) return;
        
        showToast('⏳ جاري رفع الصورة...');
        
        try {
            const fileName = `${currentUploadTarget}_${Date.now()}.${file.name.split('.').pop()}`;
            const { data: uploadData, error: uploadError } = await supabaseClient.storage
                .from('workshop-images')
                .upload(fileName, file, { upsert: true });
            
            if (uploadError) throw uploadError;
            
            const { data: urlData } = supabaseClient.storage
                .from('workshop-images')
                .getPublicUrl(fileName);
            
            const publicUrl = urlData.publicUrl;
            
            const { error: dbError } = await supabaseClient
                .from('images')
                .upsert({
                    key: currentUploadTarget,
                    url: publicUrl,
                    file_id: fileName,
                    updated_at: new Date().toISOString()
                });
            
            if (dbError) throw dbError;
            
            showToast('✅ تم رفع الصورة بنجاح');
            loadImagesManagement();
        } catch (error) {
            console.error('Upload error:', error);
            showToast('❌ فشل رفع الصورة', 'error');
        }
        
        event.target.value = '';
    }

    async function deleteImage(key) {
        if (!confirm('هل تريد حذف هذه الصورة؟')) return;
        if (!supabaseClient) return;
        
        try {
            const { error } = await supabaseClient.from('images').delete().eq('key', key);
            
            if (error) {
                showToast('❌ حدث خطأ', 'error');
                return;
            }
            
            showToast('✅ تم حذف الصورة');
            loadImagesManagement();
        } catch (error) {
            console.error('Error deleting image:', error);
            showToast('❌ حدث خطأ', 'error');
        }
    }

    // ===== Ban Management =====
    async function loadBannedList() {
        if (!supabaseClient) return;
        
        try {
            const { data: banned } = await supabaseClient
                .from('banned')
                .select('*')
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('bannedList');
            
            if (!banned || banned.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-check-circle"></i>
                        <h3>لا يوجد مستخدمين محظورين</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = banned.map(b => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 10px;">
                    <div>
                        <strong style="color: var(--primary);">${b.phone}</strong>
                        <div style="color: rgba(255,255,255,0.6); font-size: 0.9em;">${b.reason || 'بدون سبب'}</div>
                        <div style="color: rgba(255,255,255,0.4); font-size: 0.8em;">${new Date(b.created_at).toLocaleString('ar-IQ')}</div>
                    </div>
                    <button class="btn btn-success" onclick="unbanUser('${b.phone}')">
                        <i class="fas fa-unlock"></i> إلغاء الحظر
                    </button>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading banned list:', error);
        }
    }

    async function banUser() {
        const phone = document.getElementById('banPhone').value.trim();
        if (!phone) {
            showToast('❌ أدخل رقم الهاتف', 'error');
            return;
        }
        
        await banUserByPhone(phone);
        document.getElementById('banPhone').value = '';
    }

    async function banUserByPhone(phone) {
        if (!supabaseClient) return;
        if (!confirm(`هل تريد حظر ${phone}؟`)) return;
        
        try {
            const { error } = await supabaseClient.from('banned').upsert({
                phone,
                reason: 'محظور من لوحة التحكم',
                banned_by: 'admin',
                created_at: new Date().toISOString()
            });
            
            if (error) {
                showToast('❌ حدث خطأ', 'error');
                return;
            }
            
            showToast(`✅ تم حظر ${phone}`);
            loadBannedList();
            updateStats();
        } catch (error) {
            console.error('Error banning user:', error);
            showToast('❌ حدث خطأ', 'error');
        }
    }

    async function unbanUser(phone) {
        if (!supabaseClient) return;
        if (!confirm(`هل تريد إلغاء حظر ${phone}؟`)) return;
        
        try {
            const { error } = await supabaseClient.from('banned').delete().eq('phone', phone);
            
            if (error) {
                showToast('❌ حدث خطأ', 'error');
                return;
            }
            
            showToast(`✅ تم إلغاء حظر ${phone}`);
            loadBannedList();
            updateStats();
        } catch (error) {
            console.error('Error unbanning user:', error);
            showToast('❌ حدث خطأ', 'error');
        }
    }

    // ===== Notifications =====
    async function addNotification(title, text, type = 'info') {
        if (!supabaseClient) return;
        
        try {
            await supabaseClient.from('notifications').insert({
                title,
                text,
                type,
                is_read: false,
                created_at: new Date().toISOString()
            });
        } catch (error) {
            console.error('Error adding notification:', error);
        }
    }

    async function loadNotifications() {
        if (!supabaseClient) return;
        
        try {
            const { data: notifications } = await supabaseClient
                .from('notifications')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(50);
            
            const container = document.getElementById('notificationsList');
            
            if (!notifications || notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bell-slash"></i>
                        <h3>لا توجد إشعارات</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notifications.map(n => `
                <div class="notification-item ${n.is_read ? '' : 'new'}">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div class="notification-content">
                        <div class="notification-title">${n.title}</div>
                        <div class="notification-text">${n.text || ''}</div>
                        <div class="notification-time"><i class="fas fa-clock"></i> ${new Date(n.created_at).toLocaleString('ar-IQ')}</div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading notifications:', error);
        }
    }

    async function clearNotifications() {
        if (!supabaseClient) return;
        
        try {
            await supabaseClient.from('notifications').update({ is_read: true }).neq('id', 0);
            loadNotifications();
            showToast('✅ تم تحديد جميع الإشعارات كمقروءة');
        } catch (error) {
            console.error('Error clearing notifications:', error);
        }
    }

    // ===== Load Section Data =====
    async function loadSectionData(sectionId) {
        switch(sectionId) {
            case 'orders': await loadAllOrders(); break;
            case 'notifications': await loadNotifications(); break;
            case 'site-status': await updateSiteStatusBadge(); break;
            case 'sections-control': await loadSectionsControl(); break;
            case 'lock-site':
                const msg = await getSetting('lockMessage');
                document.getElementById('lockMessage').value = msg || 'الموقع مغلق للصيانة، سنعود قريباً...';
                break;
            case 'images': await loadImagesManagement(); break;
            case 'ticker': await loadTicker(); break;
            case 'tips': await loadTips(); break;
            case 'warnings': await loadWarnings(); break;
            case 'welcome': await loadWelcome(); break;
            case 'phones': await loadPhones(); break;
            case 'ban': await loadBannedList(); break;
        }
    }

    // ===== Toast =====
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        toastMessage.textContent = message;
        toast.className = 'toast show' + (isError ? ' error' : '');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

        // تهيئة Supabase أولاً

        } else {
            console.error('❌ فشل تهيئة Supabase');
        }
        
        // التركيز على أول حقل
        pinInputs[0].focus();
    });
